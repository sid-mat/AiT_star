ait_planner_node:
  ros__parameters:
    drone_radius:  0.35      # metres — collision bubble around drone
    planning_time: 2.5       # seconds — OMPL solve time budget
    replan_hz:     2.0       # Hz — path validity check rate
    planner:       "ait"     # default: ait | rrt | informed

    # Workspace bounds (metres, ROS2 frame)
    x_min: -10.0
    x_max:  10.0
    y_min: -10.0
    y_max:  10.0
    z_min:   0.5
    z_max:   8.0

drone_sim:
  ros__parameters:
    drone_speed:   2.0       # m/s
    waypoint_tol:  0.4       # m
